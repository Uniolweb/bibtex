        fi
        php -dxdebug.mode=off Build/Scripts/validateRstFiles.php;
      "

  composer_require:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
      - ${CORE_ROOT}:${CORE_ROOT}
    working_dir: ${CORE_ROOT}
    environment:
      COMPOSER_ROOT_VERSION: "dev-master"
      COMPOSER_CACHE_DIR: ".cache/composer"
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        composer require --no-progress --no-interaction -vvv typo3/cms-core:^${TYPO3_VERSION};
      "


  composer_install:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    working_dir: ${CORE_ROOT}
    environment:
      COMPOSER_ROOT_VERSION: "dev-master"
      COMPOSER_CACHE_DIR: ".cache/composer"
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        composer install --no-progress --no-interaction -vvv;
      "

  # todo: make sure this will abort on error!!!
  composer_install_max_deactivataed:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
      - ${CORE_ROOT}:${CORE_ROOT}
    working_dir: ${CORE_ROOT}
    environment:
      COMPOSER_ROOT_VERSION: "dev-master"
      COMPOSER_CACHE_DIR: ".cache/composer"
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        composer config --unset platform.php;
        composer update --no-progress --no-interaction;
        composer dumpautoload;
        composer config platform.php ^${DEFAULT_PHP_VERSION};
      "

  composer_install_min:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
      - ${CORE_ROOT}:${CORE_ROOT}
    working_dir: ${CORE_ROOT}
    environment:
      COMPOSER_ROOT_VERSION: "dev-master"
      COMPOSER_CACHE_DIR: ".cache/composer"
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        composer config platform.php ${PHP_VERSION}.0;
        composer update --prefer-lowest --no-progress --no-interaction;
        composer dumpautoload;
      "

  composer_validate:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
