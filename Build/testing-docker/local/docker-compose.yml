  build_css:
    image: typo3/core-testing-js:latest
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    environment:
      HOME: "${CORE_ROOT}/.cache"
    working_dir: ${CORE_ROOT}/Build
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        mkdir -p ${CORE_ROOT}/.cache
        yarn install || exit 1
        node_modules/grunt/bin/grunt css
      "

  build_javascript:
    image: typo3/core-testing-js:latest
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    environment:
      HOME: "${CORE_ROOT}/.cache"
    working_dir: ${CORE_ROOT}/Build
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        mkdir -p ${CORE_ROOT}/.cache
        yarn install || exit 1
        node_modules/grunt/bin/grunt scripts
      "

  cgl_git:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    # workaround for php-cs-fixer with PHP 8.4
    # https://youtrack.jetbrains.com/issue/WI-81045/PHP-CS-Fixer-does-not-work-with-PHP-8.4-interpeters
    environment:
    - PHP_CS_FIXER_IGNORE_ENV=1
    working_dir: ${CORE_ROOT}
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        Build/Scripts/cglFixMyCommit.sh ${CGLCHECK_DRY_RUN};
      "

  cgl_all:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    # workaround for php-cs-fixer with PHP 8.4
    # https://youtrack.jetbrains.com/issue/WI-81045/PHP-CS-Fixer-does-not-work-with-PHP-8.4-interpeters
    environment:
    - PHP_CS_FIXER_IGNORE_ENV=1
    working_dir: ${CORE_ROOT}
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        pwd
        php -dxdebug.mode=off ${CURDIR}.Build/bin/php-cs-fixer fix -v ${CGLCHECK_DRY_RUN} --path-mode intersection --config=Build/php-cs-fixer.php .
      "

  check_annotations:
    image: "${DOCKER_PHP_IMAGE_NAME}"
    user: "${HOST_UID}"
    volumes:
    - ${CORE_ROOT}:${CORE_ROOT}
    working_dir: ${CORE_ROOT}
    command: >
      /bin/sh -c "
        if [ ${SCRIPT_VERBOSE} -eq 1 ]; then
          set -x
        fi
        php -dxdebug.mode=off Build/Scripts/annotationChecker.php;
      "

