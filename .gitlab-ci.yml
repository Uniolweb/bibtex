#   using dedicated extension for this, see https://gitlab.uni-oldenburg.de/it-dienste/typo3/typo3-uol.de/-/issues/1423
# @todo Remove checks for PHP 8.2

stages:
  - test
  - cleanup

test-job-static:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - composer validate
    - composer lint
    - Build/Scripts/check_composer_lock_does_not_exist.sh
    - Build/Scripts/check_no_platform.php_exists_in_composer.json.sh

test-job-latest:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - if [ ! -f auth.json ] && [ ! -L auth.json ];then ln -s /home/gitlab-runner/private/auth.json auth.json;fi
    - composer install
    - composer cgl:check
    - composer phpstan
    - Build/Scripts/runTests.sh -s unit -p 8.2
    #- Build/Scripts/runTests.sh -s unit -p 8.4

test-job-info:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - echo "Hello again you, $GITLAB_USER_LOGIN!"
    - who
    - pwd
    - hostname


