
# important
#  - uses generic runTests.sh from uniolweb/unioltest (different paths !!!)

default:
  tags:
    - typo3
    - shell
    #- nolimit

stages:
  - test
  - cleanup

test-job-static:
  stage: test
  script:
    - composer validate
    - composer lint
    - Build/Scripts/check_composer_lock_does_not_exist.sh
    - Build/Scripts/check_no_platform.php_exists_in_composer.json.sh

# TYPO3 v13: PHP 8.2 - 8.5
test-job-latest:
  stage: test
  parallel:
    matrix:
      - PHPVERSION: [ "8.2", "8.3", "8.4", "8.5" ]
  script:
    - Build/Scripts/runTests.sh -t 13 -p $PHPVERSION -s composerRequire
    #- composer require typo3/cms-core:^13.4
    - composer cgl:check
    #- composer rector:check
    - Build/Scripts/runTests.sh -p $PHPVERSION -s phpstan
    - Build/Scripts/runTests.sh -s unit -p $PHPVERSION
    - Build/Scripts/runTests.sh -s functional -p $PHPVERSION


test-job-info:
  stage: test
  script:
    - echo "Hello again you, $GITLAB_USER_LOGIN!"
    - who
    - pwd
    - hostname


