
# important
#  - uses generic runTests.sh from uniolweb/unioltest (different paths !!!)


# @todo Remove checks for PHP 8.2

stages:
  - test
  - cleanup

test-job-static:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - composer validate
    - composer lint
    - Build/Scripts/check_composer_lock_does_not_exist.sh
    - Build/Scripts/check_no_platform.php_exists_in_composer.json.sh

test-job-latest:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - if [ ! -f auth.json ] && [ ! -L auth.json ];then ln -s /home/gitlab-runner/private/auth.json auth.json;fi
    - composer install
    - composer cgl:check
    #- composer phpstan
    - .Build/vendor/uniolweb/unioltest/Build/Scripts/runTests.sh -p 8.2 -s phpstan
    - .Build/vendor/uniolweb/unioltest/Build/Scripts/runTests.sh -p 8.4 -s phpstan
    - .Build/vendor/uniolweb/unioltest/Build/Scripts/runTests.sh -s unit -p 8.2
    - .Build/vendor/uniolweb/unioltest/Build/Scripts/runTests.sh -s unit -p 8.4

test-job-info:
  tags:
    - typo3
    - shell
  stage: test
  script:
    - echo "Hello again you, $GITLAB_USER_LOGIN!"
    - who
    - pwd
    - hostname


