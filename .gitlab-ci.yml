# gitlab ci
#
# prerequisites:
# 1. Install runner, see https://docs.gitlab.com/runner/install/linux-repository.html
#   https://docs.gitlab.com/ee/ci/yaml/
#   runner is installed on wwwt304:
#   Show runners:
#    $ gitlab-runner list
# 2. register runner for group: gitlab-runner register --url ... --token
#    (token is shown in Settings CI/CD for group)
#

# prevent both jobs from running at same time (should run in docker-in-docker)
# todo: remove this and run all in stage test
# todo: if possible composer install once, and run the rest at same time
stages:
  - test
  - testv11
  - cleanup

